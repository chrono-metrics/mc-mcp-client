service:
  service_url: "wss://api.mc-mcp.com"
  api_key: "${MC_MCP_API_KEY}"

session:
  enabled_tiers: ["E0", "E1", "E2"]
  budget: 40
  synthesis_cadence: 8

model:
  backend: "vllm"
  model: "qwen3-8b"
  base_url: "http://localhost:8080/v1"
  api_key: "not-needed"

episode:
  stage: 2
  max_steps: 40
  temperature: 0.7
  max_tokens: 512
  local_log_dir: "./episodes"
  stop_phrases:
    - "no more conjectures"
    - "I have no further conjectures"
